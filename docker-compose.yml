version: "3.9"

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: kubepath-neo4j
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/kubepath_secret
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  kubepath:
    build: .
    container_name: kubepath-app
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: kubepath_secret
      KUBEPATH_HOST: "0.0.0.0"
      KUBEPATH_PORT: "8000"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ~/.kube:/root/.kube:ro           # Mount kubeconfig (read-only)
      - ~/.aws:/root/.aws:ro             # Mount AWS creds (read-only)
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
